name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Triggers the deployment automatically whenever you push code here

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to prevent race conditions
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Execute Native Build Script
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Tell GitHub Pages to exclusively deploy the compiled production assets
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4